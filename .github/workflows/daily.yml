name: AI YouTube Daily

on:
  schedule:
    # 每天北京时间 09:00 (对应 UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 极其重要：这让你可以手动点一下按钮立刻测试！

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行 AI 情报系统
        env:
          # 这里的名字必须和你在 GitHub Settings 里填的一模一样
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SCTKEY: ${{ secrets.SCTKEY }}
        run: |
          python src/daily_run.py
